<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NINA-B416 Sensor Monitor</title>
    <style>
        :root {
            --primary-color: #2a4d50;       /* OTT-JAKOB Petrol/Teal */
            --primary-hover: #1d3638;       /* Dunkleres Petrol */
            --accent-color: #d63011;        /* OTT-JAKOB Orange/Rot (Login-Button) */
            --accent-hover: #b0260d;
            --bg-color: #eef3f4;            /* Heller, kühler Hintergrund-Tint */
            --text-color: #2b3031;          /* Anthrazit für bessere Lesbarkeit */
            --card-bg: #ffffff;
            --success-color: #2e7d32;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(42, 77, 80, 0.15);
            text-align: center;
            width: 90%;
            max-width: 440px;
            border-top: 6px solid var(--primary-color);
        }
        .logo-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .logo {
            max-height: 45px;
            max-width: 45%;
            object-fit: contain;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.05s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
        #disconnectBtn {
            background-color: var(--accent-color);
        }
        #disconnectBtn:hover {
            background-color: var(--accent-hover);
        }
        .status-container {
            margin: 15px 0;
            font-size: 14px;
            color: #555;
            text-align: left;
            padding: 0 5px;
            font-weight: 500;
        }
        .data-box {
            background-color: #1c2224;
            color: #30d158;
            font-family: monospace;
            font-size: 2.4rem;
            padding: 20px;
            border-radius: 8px;
            margin-top: 10px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }
        .section-title {
            text-align: left;
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 22px 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 3px;
        }
        
        /* LED Toggle Switch Style */
        .led-control-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #e0e4e6;
            margin-bottom: 15px;
        }
        .led-label {
            font-weight: bold;
            font-size: 15px;
            color: #444;
        }
        .led-switch-group {
            display: flex;
            gap: 5px;
            width: 60%;
        }
        .led-btn {
            padding: 8px 12px;
            font-size: 14px;
        }
        #ledOnBtn {
            background-color: #e0e4e6;
            color: var(--text-color);
        }
        #ledOnBtn.active {
            background-color: var(--success-color);
            color: white;
        }
        #ledOffBtn {
            background-color: #e0e4e6;
            color: var(--text-color);
        }
        #ledOffBtn.active {
            background-color: var(--accent-color);
            color: white;
        }

        .send-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .log-box {
            background-color: #1c2224;
            color: #ffffff;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            border-radius: 8px;
            height: 85px;
            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="Logo_OJ_100mm.png" alt="OTT-JAKOB Logo" class="logo">
        <img src="Power_Check_sw.png" alt="Power-Check Logo" class="logo">
    </div>

    <h2>POWER-CHECK MONITOR V1.00</h2>
    
    <div class="btn-group">
        <button id="connectBtn">Verbinden</button>
        <button id="disconnectBtn" disabled>Trennen</button>
    </div>
    
    <div class="status-container">
        <div id="statusText">Status: Nicht verbunden</div>
    </div>
    
    <div class="data-box" id="dataValue">
        -- kN
    </div>

    <div class="section-title">LED Steuerung:</div>
    <div class="led-control-box">
        <span class="led-label">Status LED:</span>
        <div class="led-switch-group">
            <button id="ledOnBtn" class="led-btn" disabled>AN (1)</button>
            <button id="ledOffBtn" class="led-btn" disabled>AUS (0)</button>
        </div>
    </div>

    <div class="section-title">Befehl an Modul senden:</div>
    <div class="send-box">
        <input type="text" id="sendInput" placeholder="z.B. Test oder AT-Kommando" disabled>
        <button id="sendBtn" style="width: auto; margin: 0;" disabled>Senden</button>
    </div>

    <div class="section-title">Nachrichten-Verlauf (Log):</div>
    <div class="log-box" id="logConsole">-- Wartet auf Verbindung --</div>
</div>

<script>
    const SERVICE_UUID = '2456e1b9-26e2-8f83-e744-f34f01e9d701';
    const CHARACTERISTIC_UUID = '2456e1b9-26e2-8f83-e744-f34f01e9d703';

    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const statusText = document.getElementById('statusText');
    const dataValue = document.getElementById('dataValue');
    const sendInput = document.getElementById('sendInput');
    const sendBtn = document.getElementById('sendBtn');
    const ledOnBtn = document.getElementById('ledOnBtn');
    const ledOffBtn = document.getElementById('ledOffBtn');
    const logConsole = document.getElementById('logConsole');

    let bleDevice = null;
    let bleCharacteristic = null;

    function logToConsole(message) {
        const now = new Date();
        const timeStr = now.toTimeString().split(' ')[0];
        if (logConsole.textContent === "-- Wartet auf Verbindung --") {
            logConsole.textContent = "";
        }
        logConsole.textContent += `[${timeStr}] ${message}
`;
        logConsole.scrollTop = logConsole.scrollHeight;
    }

    // Hilfsfunktion zum Senden von Daten (nutzt writeValueWithoutResponse)
    async function sendBleData(stringData) {
        if (!bleCharacteristic) return false;
        try {
            const encoder = new TextEncoder();
            const dataBuffer = encoder.encode(stringData);
            await bleCharacteristic.writeValueWithoutResponse(dataBuffer);
            logToConsole(`Gesendet: ${stringData}`);
            return true;
        } catch (error) {
            console.error("Sende-Fehler:", error);
            logToConsole(`Sende-Fehler: ${error.message}`);
            return false;
        }
    }

    connectBtn.addEventListener('click', async () => {
        try {
            statusText.textContent = "Status: Verbinde direkt...";
            
            // Wir suchen nach dem Namen und registrieren die Service-UUID im Hintergrund
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [
                    { name: "NINA-Sensor" } // Filtert nach dem Namen aus AT+UBTLN
                ],
                optionalServices: [SERVICE_UUID] // Schaltet den Service für die spätere Nutzung frei
            });

            statusText.textContent = `Verbinde mit ${bleDevice.name}...`;
            logToConsole(`Gerät gefunden: ${bleDevice.name}`);

            bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

            const server = await bleDevice.gatt.connect();

            statusText.textContent = "Öffne u-blox Service...";
            const service = await server.getPrimaryService(SERVICE_UUID);

            statusText.textContent = "Öffne Datenkanal...";
            bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

            statusText.textContent = "Abonniere Messwerte...";
            await bleCharacteristic.startNotifications();
            
            // UI-Elemente freischalten
            sendInput.disabled = false;
            sendBtn.disabled = false;
            ledOnBtn.disabled = false;
            ledOffBtn.disabled = false;
            disconnectBtn.disabled = false;
            connectBtn.disabled = true;
            
            bleCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
                try {
                    // Robusterer Zugriff auf das DataView-Objekt
                    const value = event.target.value || event.currentTarget.value; 
                    if (!value || value.byteLength === 0) return;
            
                    // Sicherstellen, dass wir ein ArrayBuffer-kompatibles Objekt dekodieren
                    const buffer = value.buffer ? value.buffer : value;
                    const decoder = new TextDecoder('utf-8');
                    const decodedString = decoder.decode(buffer).trim();
                    
                    let displayValue = "";
                    
                    // Prüfen, ob es sich um lesbaren ASCII-Text handelt
                    if (/^[\x20-\x7E]*$/.test(decodedString) && decodedString.length > 0) {
                        displayValue = decodedString;
                        logToConsole(`Empfangen: ${decodedString}`);
                    } else {
                        // Falls Rohdaten gesendet wurden (z.B. 0x7B für 123)
                        displayValue = value.getUint8(0).toString();
                        logToConsole(`Empfangen (Byte): ${displayValue}`);
                    }
                    
                    dataValue.textContent = `${displayValue} kN`;
                } catch (e) {
                    console.error("Fehler beim Datenempfang:", e);
                    logToConsole(`Empfangs-Fehler: ${e.message}`);
                }
            });

            statusText.textContent = "Status: Verbunden & Bereit";
            connectBtn.style.backgroundColor = "#34c759";
            connectBtn.textContent = "Verbunden";
            logToConsole("Erfolgreich verbunden.");

        } catch (error) {
            console.error("BLE-Fehler:", error);
            statusText.textContent = `Fehler: ${error.message}`;
            logToConsole(`FEHLER: ${error.message}`);
        }
    });

    // Manuelles Trennen der Verbindung
    disconnectBtn.addEventListener('click', () => {
        if (bleDevice && bleDevice.gatt.connected) {
            logToConsole("Verbindung wird manuell getrennt...");
            bleDevice.gatt.disconnect();
        }
    });

    // Zustand nach dem Trennen zurücksetzen
    function onDisconnected() {
        statusText.textContent = "Status: Nicht verbunden";
        dataValue.textContent = "-- kN";
        connectBtn.style.backgroundColor = "var(--primary-color)";
        connectBtn.textContent = "Verbinden";
        
        // UI zurücksetzen
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        sendInput.disabled = true;
        sendBtn.disabled = true;
        ledOnBtn.disabled = true;
        ledOffBtn.disabled = true;
        ledOnBtn.classList.remove('active');
        ledOffBtn.classList.remove('active');
        
        bleCharacteristic = null;
        logToConsole("Verbindung getrennt.");
    }

    // LED Einschalten Button
    ledOnBtn.addEventListener('click', async () => {
        const success = await sendBleData("1");
        if (success) {
            ledOnBtn.classList.add('active');
            ledOffBtn.classList.remove('active');
        }
    });

    // LED Ausschalten Button
    ledOffBtn.addEventListener('click', async () => {
        const success = await sendBleData("0");
        if (success) {
            ledOffBtn.classList.add('active');
            ledOnBtn.classList.remove('active');
        }
    });

// Absende-Funktion für Textdaten (Optimiert für Smartphones)
    sendBtn.addEventListener('click', async () => {
        if (!bleCharacteristic || !sendInput.value) return;

        const textToSend = sendInput.value;
        try {
            const encoder = new TextEncoder();
            const dataBuffer = encoder.encode(textToSend);
            
            // ÄNDERUNG HIER: Explizit mit Rückmeldung schreiben (wichtig für iOS/Android)
            if (typeof bleCharacteristic.writeValueWithResponse === 'function') {
                await bleCharacteristic.writeValueWithResponse(dataBuffer);
            } else {
                // Fallback für ältere Browser-Versionen
                await bleCharacteristic.writeValue(dataBuffer);
            }
            
            logToConsole(`Gesendet: ${textToSend}`);
            sendInput.value = "";
        } catch (error) {
            console.error("Sende-Fehler:", error);
            logToConsole(`Sende-Fehler: ${error.message}`);
        }
    });

    sendInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !sendBtn.disabled) {
            sendBtn.click();
        }
    });
</script>

</body>
</html>
